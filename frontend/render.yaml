services:
  - type: web
    name: sarvcare-frontend
    env: static
    plan: free
    buildCommand: "npm run build"
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /.*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://your-backend-name.onrender.com
